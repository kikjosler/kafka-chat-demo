name: Kafka Load Test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Start full stack
      run: |
        docker compose up -d
        
    - name: Wait for services
      run: |
        sleep 30
        curl -f http://localhost:8000/health || exit 1
        
    - name: Install Locust
      run: pip install locust==2.29.0
      
    - name: Run Load Test
      run: |
        locust -f tests/locustfile.py \
          --headless --users 5 --spawn-rate 1 \
          --run-time 20s --host=http://localhost:8000 \
          --html=report.html
        
    - name: Upload Results
      uses: actions/upload-artifact@v4
      with:
        name: locust-report
        path: |
          report.html
          tests/locustfile.py
