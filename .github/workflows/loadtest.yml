name: Kafka Load Test ✅
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Start Kafka Stack
      run: |
        docker compose up -d
        sleep 40  # Ждём Kafka + FastAPI
        
    - name: Health Check
      run: |
        curl -f http://localhost:8000/health
        
    - name: Load Test API
      run: |
        for i in {1..50}; do
          curl -s -w "%%{http_code} " \
            -X POST "http://localhost:8000/send-message" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"CI test $i\", \"user\": \"github\"}" || echo "FAIL $i"
        done
        
    - name: Test Results
      run: |
        curl http://localhost:8000/health
        docker compose logs fastapi | tail -20
        
    - name: Stop
      run: docker compose down
